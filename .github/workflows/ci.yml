name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'
      - 'package.json'

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify sfdx-project.json
        run: |
          if [ ! -f sfdx-project.json ]; then
            echo "sfdx-project.json not found!"
            exit 1
          fi
          echo "sfdx-project.json found"
          cat sfdx-project.json | python3 -m json.tool > /dev/null

      - name: Verify Apex classes have meta.xml
        run: |
          MISSING=0
          for cls in force-app/main/default/classes/*.cls; do
            if [ ! -f "${cls}-meta.xml" ]; then
              echo "Missing meta.xml for: $cls"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING classes are missing meta.xml files"
            exit 1
          fi
          echo "All Apex classes have meta.xml files"

  lwc-tests:
    name: LWC Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run LWC tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lwc-coverage
          path: coverage/
