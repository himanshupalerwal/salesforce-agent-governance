<template>
    <div class="slds-page-header slds-m-bottom_medium">
        <div class="slds-page-header__row">
            <div class="slds-page-header__col-title">
                <div class="slds-media">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="standard:bot" size="large"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h1 class="slds-page-header__title">AgentGov Dashboard</h1>
                        <p class="slds-text-body_small slds-text-color_weak">AI Agent Governance Overview</p>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__col-actions">
                <lightning-button label="Refresh" icon-name="utility:refresh" onclick={handleRefresh}></lightning-button>
            </div>
        </div>
    </div>

    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <template if:true={error}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <h2>{error}</h2>
        </div>
    </template>

    <template if:false={isLoading}>
        <!-- Summary Cards -->
        <div class="slds-grid slds-gutters slds-m-bottom_medium">
            <div class="slds-col slds-size_1-of-4">
                <lightning-card>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <p class="slds-text-title_caps">Total Agents</p>
                        <p class="slds-text-heading_large">{totalAgents}</p>
                    </div>
                </lightning-card>
            </div>
            <div class="slds-col slds-size_1-of-4">
                <lightning-card>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <p class="slds-text-title_caps">Active Agents</p>
                        <p class="slds-text-heading_large slds-text-color_success">{activeAgents}</p>
                    </div>
                </lightning-card>
            </div>
            <div class="slds-col slds-size_1-of-4">
                <lightning-card>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <p class="slds-text-title_caps">Avg Budget Used</p>
                        <p class="slds-text-heading_large">{avgBudgetUtilization}%</p>
                    </div>
                </lightning-card>
            </div>
            <div class="slds-col slds-size_1-of-4">
                <lightning-card>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <p class="slds-text-title_caps">Conflicts</p>
                        <p class="slds-text-heading_large slds-text-color_error">{conflictsDetected}</p>
                    </div>
                </lightning-card>
            </div>
        </div>

        <!-- Budget Usage per Agent -->
        <lightning-card title="Governor Budget Usage" icon-name="standard:dashboard">
            <div class="slds-p-around_medium">
                <template if:true={hasBudgets}>
                    <template for:each={budgets} for:item="budget">
                        <div key={budget.Id} class="slds-m-bottom_small">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                                <span class="slds-text-body_regular">{budget.agentName}</span>
                                <span class="slds-badge {budget.statusClass}">{budget.Budget_Status__c}</span>
                            </div>
                            <div class="slds-progress-bar" aria-valuemin="0" aria-valuemax="100" aria-valuenow={budget.avgPercent}>
                                <span class={budget.barClass} style={budget.barStyle}>
                                    <span class="slds-assistive-text">{budget.avgPercent}%</span>
                                </span>
                            </div>
                            <div class="slds-grid slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                <span class="slds-col">API: {budget.apiPercent}%</span>
                                <span class="slds-col">SOQL: {budget.soqlPercent}%</span>
                                <span class="slds-col">DML: {budget.dmlPercent}%</span>
                            </div>
                        </div>
                    </template>
                </template>
                <template if:false={hasBudgets}>
                    <div class="slds-text-align_center slds-text-color_weak slds-p-around_medium">
                        No budget data available for today.
                    </div>
                </template>
            </div>
        </lightning-card>

        <!-- Recent Conflicts -->
        <lightning-card title="Recent Conflicts" icon-name="standard:case" class="slds-m-top_medium">
            <div class="slds-p-around_medium">
                <template if:true={hasConflicts}>
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col"><div class="slds-truncate">Time</div></th>
                                <th scope="col"><div class="slds-truncate">Agent 1</div></th>
                                <th scope="col"><div class="slds-truncate">Agent 2</div></th>
                                <th scope="col"><div class="slds-truncate">Object</div></th>
                                <th scope="col"><div class="slds-truncate">Type</div></th>
                                <th scope="col"><div class="slds-truncate">Resolution</div></th>
                                <th scope="col"><div class="slds-truncate">Severity</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={conflicts} for:item="conflict">
                                <tr key={conflict.Id}>
                                    <td><div class="slds-truncate">{conflict.formattedTime}</div></td>
                                    <td><div class="slds-truncate">{conflict.agent1Name}</div></td>
                                    <td><div class="slds-truncate">{conflict.agent2Name}</div></td>
                                    <td><div class="slds-truncate">{conflict.Object_Name__c}</div></td>
                                    <td><div class="slds-truncate">{conflict.Conflict_Type__c}</div></td>
                                    <td><div class="slds-truncate">{conflict.Resolution__c}</div></td>
                                    <td><span class={conflict.severityClass}>{conflict.Severity__c}</span></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
                <template if:false={hasConflicts}>
                    <div class="slds-text-align_center slds-text-color_weak slds-p-around_medium">
                        No conflicts detected.
                    </div>
                </template>
            </div>
        </lightning-card>
    </template>
</template>
